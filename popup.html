<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Avaamo Copilot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f23;
      color: #e0e0f0;
    }

    /* ---- Header ---- */
    .header {
      padding: 14px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 20px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #7c83fd; flex: 1; }
    .version { font-size: 10px; color: #555; }

    /* ---- Sidebar toggle ---- */
    .toggle-section {
      padding: 16px;
      border-bottom: 1px solid #1e1e3a;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-label { font-size: 13px; font-weight: 600; }
    .toggle-sub   { font-size: 11px; color: #666; margin-top: 3px; }

    .switch { position: relative; width: 46px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #2a2a4a; border-radius: 26px;
      cursor: pointer; transition: background 0.25s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 20px; height: 20px;
      left: 3px; top: 3px;
      background: #fff; border-radius: 50%;
      transition: transform 0.25s;
    }
    input:checked + .slider { background: #7c83fd; }
    input:checked + .slider::before { transform: translateX(20px); }

    /* ---- Status badge ---- */
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; margin-top: 8px;
      padding: 3px 8px; border-radius: 20px;
      background: #1e1e3a;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #555; transition: background 0.3s;
    }
    .status-dot.active { background: #4ade80; }

    /* ---- API Keys section ---- */
    .section-title {
      padding: 12px 16px 6px;
      font-size: 11px; font-weight: 700;
      color: #555; text-transform: uppercase; letter-spacing: 0.8px;
    }
    .key-row {
      padding: 6px 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .key-label {
      font-size: 12px; width: 90px; color: #aaa; flex-shrink: 0;
    }
    .key-input {
      flex: 1; background: #1e1e3a; border: 1px solid #2a2a4a;
      border-radius: 6px; padding: 6px 10px;
      color: #e0e0f0; font-size: 12px; outline: none;
      font-family: monospace;
    }
    .key-input:focus { border-color: #7c83fd; }
    .key-status {
      width: 8px; height: 8px; border-radius: 50%;
      background: #333; flex-shrink: 0;
    }
    .key-status.set { background: #4ade80; }

    /* ---- Default LLM picker ---- */
    .select-row {
      padding: 6px 16px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .select-label { font-size: 12px; color: #aaa; width: 90px; flex-shrink: 0; }
    select {
      flex: 1; background: #1e1e3a; border: 1px solid #2a2a4a;
      border-radius: 6px; padding: 6px 10px;
      color: #e0e0f0; font-size: 12px; outline: none; cursor: pointer;
    }
    select:focus { border-color: #7c83fd; }

    /* ---- Save button ---- */
    .save-row {
      padding: 0 16px 14px;
    }
    .save-btn {
      width: 100%; padding: 9px;
      background: #7c83fd; border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .save-btn:hover { background: #5c63dd; }
    .save-btn:active { background: #4a50cc; }

    /* ---- Footer links ---- */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1e1e3a;
      display: flex; gap: 12px; justify-content: center;
    }
    .footer a {
      font-size: 11px; color: #555; text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: #7c83fd; }

    .toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #4ade80; color: #000; font-size: 12px; font-weight: 600;
      padding: 6px 16px; border-radius: 20px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo">⚡</span>
    <h1>Avaamo Copilot</h1>
    <span class="version">v2.0</span>
  </div>

  <!-- Sidebar toggle -->
  <div class="toggle-section">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Sidebar</div>
        <div class="toggle-sub">Inject on Avaamo pages</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="sidebarToggle" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Inactive</span>
    </div>
  </div>

  <!-- API Keys -->
  <div class="section-title">API Keys</div>

  <div class="key-row">
    <span class="key-label">Groq</span>
    <input class="key-input" type="password" id="groqKey" placeholder="gsk_..." />
    <div class="key-status" id="groqDot"></div>
  </div>
  <div class="key-row">
    <span class="key-label">Gemini</span>
    <input class="key-input" type="password" id="geminiKey" placeholder="AIza..." />
    <div class="key-status" id="geminiDot"></div>
  </div>
  <div class="key-row">
    <span class="key-label">OpenRouter</span>
    <input class="key-input" type="password" id="openrouterKey" placeholder="sk-or-..." />
    <div class="key-status" id="openrouterDot"></div>
  </div>
  <div class="key-row">
    <span class="key-label">HuggingFace</span>
    <input class="key-input" type="password" id="hfKey" placeholder="hf_..." />
    <div class="key-status" id="hfDot"></div>
  </div>

  <!-- Default LLM -->
  <div class="select-row">
    <span class="select-label">Default LLM</span>
    <select id="defaultLLM">
      <option value="huggingface">HuggingFace (Qwen3-235B) — Best</option>
      <option value="gemini">Gemini 2.5 Flash — Analysis</option>
      <option value="groq">Groq (Llama 3.3 70B) — Fast</option>
      <option value="openrouter">OpenRouter (Auto) — Fallback</option>
    </select>
  </div>

  <div class="save-row">
    <button class="save-btn" id="saveBtn">Save Settings</button>
  </div>

  <div class="footer">
    <a href="https://aistudio.google.com" target="_blank">Get Gemini key</a>
    <a href="https://console.groq.com" target="_blank">Get Groq key</a>
    <a href="https://openrouter.ai" target="_blank">OpenRouter</a>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script src="popup.js"></script>
</body>
</html>
